name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & test
    runs-on: windows-latest
    env:
      # The app and its tests print Cyrillic; force UTF-8 so a cp1252 console
      # on the runner does not raise UnicodeEncodeError.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Configure git (needed by repo-context tests)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main

      - name: Lint (ruff)
        run: ruff check .

      - name: Byte-compile
        run: python -m compileall -q server.py launcher.py core.py auth tests

      - name: Run tests
        env:
          # Use the runner's long-path temp dir (e.g. D:\a\_temp) instead of the
          # default 8.3 short path (C:\Users\RUNNER~1\...) so Path.resolve()
          # comparisons in SafePathTests are stable.
          TMP: ${{ runner.temp }}
          TEMP: ${{ runner.temp }}
        run: python -m unittest discover -s tests -v
