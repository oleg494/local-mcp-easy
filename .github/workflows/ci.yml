name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # Python 3.13 is ALLOWED TO FAIL for the 2.3.0 release (continue-on-error),
    # so a 3.13-only regression does not block merges. 3.10/3.11/3.12 stay
    # REQUIRED (must remain green). Promote 3.13 to required once ecosystem
    # support matures.
    continue-on-error: ${{ matrix.python-version == '3.13' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      # The app and its tests print Cyrillic; force UTF-8 so a cp1252 console
      # on Windows (or a non-UTF-8 POSIX locale on Linux/macOS) does not raise
      # UnicodeEncodeError. Safe to set cross-platform.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Pin ruff to an EXACT version so the lint result is reproducible
          # across runs and contributors. Keep this pin in sync with the
          # version noted at the top of ruff.toml.
          pip install ruff==0.15.22
          # pip-audit checks the pinned dependencies in requirements.txt
          # against known vulnerability databases (OSV/PyAdvisory).
          pip install pip-audit

      - name: Configure git (needed by repo-context tests)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main

      - name: Lint (ruff)
        run: ruff check .

      - name: Byte-compile
        run: python -m compileall -q server.py launcher.py core.py auth tests

      - name: Security (pip-audit --strict)
        # Audits requirements.txt pins against known CVEs. --strict fails CI
        # on ANY known vulnerability. Escape-hatch for an unfixable transitive:
        # append `--ignore-vuln <id>` to the command below. EACH ignore must be
        # tracked as an open issue and re-evaluated periodically. Do not add
        # ignores speculatively -- only for vulns that genuinely cannot be
        # fixed (e.g. a transitive with no patched release yet).
        run: pip-audit -r requirements.txt --strict

      - name: Use long-path temp dir (Windows only)
        # Use the runner's long-path temp dir (e.g. D:\a\_temp) instead of the
        # default 8.3 short path (C:\Users\RUNNER~1\...) so Path.resolve()
        # comparisons in SafePathTests are stable. Only needed on Windows.
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "TMP=${RUNNER_TEMP}" >> "$GITHUB_ENV"
          echo "TEMP=${RUNNER_TEMP}" >> "$GITHUB_ENV"

      - name: Run tests
        run: python -m unittest discover -s tests -v
